name: Fetch Approved Comments

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write           # Required to push commits back to main

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch approved comments from GAS
        env:
          GAS_COMMENTS_URL: ${{ secrets.GAS_COMMENTS_URL }}
        run: |
          if [ -z "$GAS_COMMENTS_URL" ]; then
            echo "GAS_COMMENTS_URL not set — skipping fetch"
            exit 0
          fi
          curl -fsSL "$GAS_COMMENTS_URL" -o content/comments.json
          echo "Fetched comments.json"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/comments.json
          git diff --cached --quiet || git commit -m "chore: update approved comments [skip ci]"
          git push
